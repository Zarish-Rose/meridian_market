{% extends 'base.html' %}

{% block title %}Create Campaign{% endblock %}

{% block content %}
<h2>Create Campaign for {{ store.name }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create Campaign</button>
</form>

<p><a href="{% url 'campaign_list' store.id %}">Back to Campaigns</a></p>
{% endblock %}

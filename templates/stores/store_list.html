{% extends 'base.html' %}

{% block title %}My Stores{% endblock %}

{% block content %}
<h2>My Stores</h2>

<p><a href="{% url 'create_store' %}">+ Create New Store</a></p>

{% if stores %}
    <ul>
        {% for store in stores %}
            <li>{{ store.name }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>You have no stores yet.</p>
{% endif %}
{% endblock %}

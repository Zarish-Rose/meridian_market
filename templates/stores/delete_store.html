{% extends 'base.html' %}

{% block title %}Delete {{ store.name }}{% endblock %}

{% block content %}
<h2>Delete Store</h2>

<p>Are you sure you want to delete <strong>{{ store.name }}</strong>?</p>
<p>This action cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete this store</button>
</form>

<p><a href="{% url 'store_detail' store.id %}">Cancel</a></p>
{% endblock %}

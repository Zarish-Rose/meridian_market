{% extends 'base.html' %}

{% block title %}Add Team Member{% endblock %}

{% block content %}
<h2>Add Team Member to {{ store.name }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Add Member</button>
</form>

<p><a href="{% url 'store_detail' store.id %}">Back to Store</a></p>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2>Welcome, {{ request.user.username }}!</h2>

<p>Your account is active and you're logged in.</p>

<p>Profile created: {{ request.user.profile.created_at }}</p>

<p><a href="{% url 'edit_profile' %}">Edit Profile</a></p>
<a href="{% url 'logout' %}">Logout</a>
{% endblock %}

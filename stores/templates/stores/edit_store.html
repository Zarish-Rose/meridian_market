{% extends 'base.html' %}

{% block title %}Edit {{ store.name }}{% endblock %}

{% block content %}
<h2>Edit Store</h2>

<form method="post" enctype="multipart/form-data">
{% if store.logo %}
    <p>Current Logo:</p>
    <img src="{{ store.logo.url }}" alt="Store Logo" style="max-height: 120px;">
{% endif %}
</form>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
</form>

<p><a href="{% url 'store_detail' store.id %}">Back to Store</a></p>
{% endblock %}

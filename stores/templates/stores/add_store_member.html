{% extends 'base.html' %}

{% block title %}Add Team Member{% endblock %}

{% block extra_css %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/stores.css' %}">
{% endblock %}

{% block content %}
<section class="stores-page">
    <article class="card form-card">
        <h2>Add Team Member to {{ store.name }}</h2>

        <form method="post" class="store-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Add Member</button>
        </form>

        <p class="page-link-row"><a href="{% url 'store_detail' store.id %}" class="btn btn-ghost">Back to Store</a></p>
    </article>
</section>
{% endblock %}
